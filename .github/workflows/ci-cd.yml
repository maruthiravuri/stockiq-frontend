name: Frontend CI/CD

on:
  push:
    branches: [main, develop, "feature/**", "hotfix/**", "release/**"]
  pull_request:
    branches: [main, develop]

env:
  AWS_REGION: us-west-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-west-2.amazonaws.com
  S3_BUCKET: stockiq-frontend-${{ secrets.AWS_ACCOUNT_ID }}
  CF_DISTRIBUTION: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

      - name: Run unit tests (vitest)
        run: npm test

      - name: Build production bundle (Vite)
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.REACT_APP_API_URL || 'http://localhost:8080' }}
          VITE_WS_URL: ${{ secrets.REACT_APP_WS_URL || 'http://localhost:8082/ws/quotes' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: build/
          retention-days: 3

  playwright-e2e:
    name: Playwright E2E
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx playwright install --with-deps chromium firefox
      - name: Start app & run E2E
        run: |
          npm start &
          npx wait-on http://localhost:3000 --timeout 60000
          npx playwright test --reporter=html
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.sha }}
          path: playwright-report/
          retention-days: 7

  docker-push:
    name: Docker Build & Push
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: build/
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/stockiq-frontend:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/stockiq-frontend:${{ github.ref == 'refs/heads/main' && 'latest' || 'staging' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy Staging
    needs: docker-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: build/
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - run: |
          aws s3 sync build/ s3://${{ env.S3_BUCKET }}-staging --delete --exclude "index.html"
          aws s3 cp build/index.html s3://${{ env.S3_BUCKET }}-staging/index.html --cache-control "no-cache"

  deploy-production:
    name: Deploy Production
    needs: [docker-push, playwright-e2e]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: build/
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - run: |
          aws s3 sync build/ s3://${{ env.S3_BUCKET }} --delete --exclude "index.html"
          aws s3 cp build/index.html s3://${{ env.S3_BUCKET }}/index.html --cache-control "no-cache"
          aws cloudfront create-invalidation --distribution-id ${{ env.CF_DISTRIBUTION }} --paths "/*"
